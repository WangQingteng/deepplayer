name: Build & Release

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: |
          pip install -r requirements.txt
          pip install -r tests/requirements-test.txt
          sudo apt-get update && sudo apt-get install -y vlc libvlc-dev
      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

  build:
    needs: test
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            asset_name: DeepPlayer-linux
            pkg_cmd: tar -czf DeepPlayer-linux.tar.gz -C dist/DeepPlayer .
            pkg_ext: tar.gz
          - os: macos-latest
            asset_name: DeepPlayer-macos
            pkg_cmd: tar -czf DeepPlayer-macos.tar.gz -C dist/DeepPlayer .
            pkg_ext: tar.gz
          - os: windows-latest
            asset_name: DeepPlayer-windows
            pkg_cmd: Compress-Archive -Path dist\DeepPlayer\* -DestinationPath DeepPlayer-windows.zip
            pkg_ext: zip

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Install VLC (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y vlc libvlc-dev

      - name: Install VLC (macOS)
        if: runner.os == 'macOS'
        run: brew install --cask vlc

      - name: Build
        run: python build.py --download-vlc

      - name: Package
        shell: bash
        run: ${{ matrix.pkg_cmd }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: DeepPlayer-*.${{ matrix.pkg_ext }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: DeepPlayer ${{ github.ref_name }}
          body: |
            跨平台视频播放器 | PySide6 + libVLC

            - **DeepPlayer-windows.zip** — 解压即用
            - **DeepPlayer-linux.tar.gz** — 解压即用
            - **DeepPlayer-macos.tar.gz** — 解压即用

            无需安装 Python 或 VLC。
          files: |
            DeepPlayer-windows/DeepPlayer-windows.zip
            DeepPlayer-linux/DeepPlayer-linux.tar.gz
            DeepPlayer-macos/DeepPlayer-macos.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
