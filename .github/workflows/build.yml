name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            artifact: DeepPlayer
            asset_name: DeepPlayer-linux
          - os: macos-latest
            artifact: DeepPlayer
            asset_name: DeepPlayer-macos
          - os: windows-latest
            artifact: DeepPlayer.exe
            asset_name: DeepPlayer-windows.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Install VLC (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y vlc libvlc-dev

      - name: Install VLC (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install --cask vlc

      - name: Install VLC (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install vlc -y
          echo "C:\Program Files\VideoLAN\VLC" >> $env:GITHUB_PATH

      - name: Build
        run: python build.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: DeepPlayer ${{ github.ref_name }}
          body: |
            跨平台视频播放器，基于 PySide6 + libVLC。

            - **DeepPlayer-windows.exe** — Windows 单文件，双击即用
            - **DeepPlayer-linux** — Linux 单文件
            - **DeepPlayer-macos** — macOS 单文件

            无需安装 Python 或 VLC，下载后直接运行。
          files: |
            DeepPlayer-windows.exe/DeepPlayer.exe
            DeepPlayer-linux/DeepPlayer
            DeepPlayer-macos/DeepPlayer
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
