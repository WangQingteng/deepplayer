name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            asset_name: DeepPlayer-linux
          - os: macos-latest
            asset_name: DeepPlayer-macos
          - os: windows-latest
            asset_name: DeepPlayer-windows

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Install VLC (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y vlc libvlc-dev

      - name: Install VLC (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install --cask vlc

      - name: Install VLC (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install vlc -y
          echo "C:\Program Files\VideoLAN\VLC" >> $env:GITHUB_PATH

      - name: Build
        run: python build.py

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist\DeepPlayer\* -DestinationPath DeepPlayer-windows.zip

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: tar -czf DeepPlayer-linux.tar.gz -C dist/DeepPlayer .

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: tar -czf DeepPlayer-macos.tar.gz -C dist/DeepPlayer .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: |
            DeepPlayer-windows.zip
            DeepPlayer-linux.tar.gz
            DeepPlayer-macos.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: DeepPlayer ${{ github.ref_name }}
          body: |
            跨平台视频播放器 | PySide6 + libVLC

            - **DeepPlayer-windows.zip** — 解压即用
            - **DeepPlayer-linux.tar.gz** — 解压即用
            - **DeepPlayer-macos.tar.gz** — 解压即用

            无需安装 Python 或 VLC。
          files: |
            DeepPlayer-windows/DeepPlayer-windows.zip
            DeepPlayer-linux/DeepPlayer-linux.tar.gz
            DeepPlayer-macos/DeepPlayer-macos.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
