name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            asset_name: DeepPlayer-linux
          - os: macos-latest
            asset_name: DeepPlayer-macos
          - os: windows-latest
            asset_name: DeepPlayer-windows

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Install VLC (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y vlc libvlc-dev

      - name: Install VLC (macOS)
        if: runner.os == 'macOS'
        run: brew install --cask vlc

      - name: Install VLC (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install vlc -y --no-progress
          echo "C:\Program Files\VideoLAN\VLC" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build
        shell: bash
        run: python build.py

      - name: Package
        run: python -c "import shutil; shutil.make_archive('${{ matrix.asset_name }}', 'zip', 'dist/DeepPlayer')"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: DeepPlayer ${{ github.ref_name }}
          body: |
            跨平台视频播放器 | PySide6 + libVLC

            - **DeepPlayer-windows.zip** — 解压即用
            - **DeepPlayer-linux.zip** — 解压即用
            - **DeepPlayer-macos.zip** — 解压即用

            无需安装 Python 或 VLC。
          files: |
            DeepPlayer-windows/DeepPlayer-windows.zip
            DeepPlayer-linux/DeepPlayer-linux.zip
            DeepPlayer-macos/DeepPlayer-macos.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
